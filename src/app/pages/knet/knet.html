<div class="min-h-screen bg-[#d9d9d9] px-4 pt-0 pb-4 font-sans overflow-hidden">
  <div class="w-full max-w-[385px] mx-auto mt-0">

    <!-- Banner Image -->
    <div class="mb-3">
      @if (bannerImagePath) {
      <img [src]="bannerImagePath" alt="Banner" class="w-full h-auto rounded-[10px] border border-[#cfcfcf]">
      }
    </div>

    <!-- Card 1: Logo & Merchant Info -->
    <div
      class="bg-white p-3 pb-0 border-2 border-[#9e9e9e] rounded-[15px] mb-3 shadow-[0_1px_0_rgba(255,255,255,0.7),0_3px_8px_rgba(0,0,0,0.25)]">

      <!-- Logo -->
      <div class="mb-4 flex justify-center">
        @if (kfhLogoPath) {
        <img [src]="kfhLogoPath" alt="KFH Logo" class="w-[135px] max-w-full h-auto">
        } @else {
        <div class="text-center py-3">
          <p class="text-gray-500 text-xs">Logo</p>
        </div>
        }
      </div>

      <!-- Merchant -->
      <div class="py-[5px] border-b border-[#8f8f90]">
        <div class="grid grid-cols-[40%_1fr_40%] items-center">
          <label
            class="text-[11px] text-[#0070cd] font-bold drop-shadow-[0_1px_2px_rgba(0,0,0,0.2)] justify-self-start">Merchant:</label>
          <div class="text-[#444444] text-[11px] text-center text-nowrap">{{ merchantName }}</div>
          <div></div>
        </div>
      </div>

      <!-- Amount -->
      <div class="py-[5px]">
        <div class="grid grid-cols-[40%_1fr_40%] items-center">
          <label
            class="text-[11px] text-[#0070cd] font-bold drop-shadow-[0_1px_2px_rgba(0,0,0,0.2)] justify-self-start">Amount:</label>
          <div class="text-[#444444] text-[11px] font-normal text-center">KD {{ amount | number:'1.3-3' }}</div>
          <div></div>
        </div>
      </div>
    </div>

    @if (view === 'form') {
    <!-- Card 2: Payment Form -->
    <div
      class="bg-white p-3 border-2 border-[#9e9e9e] rounded-[15px] mb-3 shadow-[0_1px_0_rgba(255,255,255,0.7),0_3px_8px_rgba(0,0,0,0.25)]">

      @if (formError) {
      <div class="mb-2 rounded-md border border-red-300 bg-red-50 px-3 py-2 text-[11px] text-red-700 text-center">
        {{ formError }}
      </div>
      }

      <!-- Select Your Bank -->
      <div class="py-[5px] border-b border-[#8f8f90]">
        <div class="flex items-center justify-between">
          <label
            class="text-[11px] text-[#0070cd] font-bold w-[40%] text-left drop-shadow-[0_1px_2px_rgba(0,0,0,0.2)]">Select
            Your Bank:</label>
          <select [(ngModel)]="selectedBank" (ngModelChange)="onBankChange()" name="bank" class="w-[60%] h-[21px] px-1 border-2 border-[#9e9e9e] text-[#444444] text-[11px] bg-white
                   focus:outline-none shadow-none focus:shadow-none">
            <option value="" selected disabled>Select Your Bank</option>
            @for (bank of banks; track bank) {
            <option [value]="bank">{{ bank }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Card Number -->
      <div class="py-[5px] border-b border-[#8f8f90]">
        <div class="flex items-center justify-between gap-1">
          <label
            class="text-[11px] text-[#0070cd] font-bold w-[40%] text-left drop-shadow-[0_1px_2px_rgba(0,0,0,0.2)]">Card
            Number:</label>
          <div class="flex gap-1 w-[60%]">
            <select [(ngModel)]="cardPrefix" name="prefix" class="w-1/2 h-[21px] px-1 border-2 border-[#9e9e9e] text-[#444444] text-[11px] bg-white
                      focus:outline-none shadow-none focus:shadow-none">
              <option value="" selected disabled>prefix</option>
              @for (p of prefixOptions; track p) {
              <option [value]="p">{{ p }}</option>
              }
            </select>
            <input type="tel" [(ngModel)]="cardNumber" (input)="onCardNumberInput($event)"
              (keydown)="digitsOnlyKeydown($event, 11)" (paste)="digitsOnlyPaste($event, 11, 'cardNumber')"
              name="cardNumber" maxlength="11" inputmode="numeric" pattern="[0-9]*" class="w-1/2 h-[21px] px-1 border-2 border-[#0070cd] text-[#444444] text-[11px] bg-white
                     focus:outline-none shadow-[inset_0_0_5px_rgba(0,0,0,0.3)]">
          </div>
        </div>
      </div>

      <!-- Expiration Date -->
      <div class="py-[5px] border-b border-[#8f8f90]">
        <div class="flex items-center justify-between gap-1">
          <label
            class="text-[11px] text-[#0070cd] font-bold w-[40%] text-left drop-shadow-[0_1px_2px_rgba(0,0,0,0.2)]">Expiration
            Date:</label>
          <div class="flex gap-1 w-[60%]">
            <select [(ngModel)]="expirationMonth" name="month" required class="w-[75px] h-[21px] px-1 border-2 border-[#0070cd] text-[#444444] text-[11px] bg-white rounded-sm
                     focus:outline-none focus:border-[#0070cd] focus:ring-1 focus:ring-[#0070cd]
                     appearance-auto cursor-pointer">
              <option value="MM" disabled selected>MM</option>
              @for (month of months; track month) {
              @if (month !== 'MM') {
              <option [value]="month">{{ month }}</option>
              }
              }
            </select>
            <select [(ngModel)]="expirationYear" name="year" required class="flex-1 h-[21px] px-1 border-2 border-[#0070cd] text-[#444444] text-[11px] bg-white rounded-sm
                     focus:outline-none focus:border-[#0070cd] focus:ring-1 focus:ring-[#0070cd]
                     appearance-auto cursor-pointer">
              <option value="YYYY" disabled selected>YYYY</option>
              @for (year of years; track year) {
              @if (year !== 'YYYY') {
              <option [value]="year">{{ year }}</option>
              }
              }
            </select>
          </div>
        </div>
      </div>

      <!-- PIN -->
      <div class="py-[5px]">
        <div class="flex items-center justify-between">
          <label
            class="text-[11px] text-[#0070cd] font-bold w-[40%] text-left drop-shadow-[0_1px_2px_rgba(0,0,0,0.2)]">PIN:</label>
          <input type="password" [(ngModel)]="pin" (input)="onPinInput($event)" (keydown)="digitsOnlyKeydown($event, 4)"
            (paste)="digitsOnlyPaste($event, 4, 'pin')" name="pin" placeholder="****" maxlength="4" required
            inputmode="numeric" pattern="[0-9]*" class="w-[60%] h-[21px] px-1 border-2 border-[#0070cd] text-[#444444] text-[11px] bg-white rounded-sm
                   focus:outline-none focus:border-[#0070cd] focus:ring-2 focus:ring-[#0070cd] 
                   shadow-[inset_0_0_5px_rgba(0,0,0,0.3)]
                   placeholder:text-gray-400">
        </div>
      </div>
    </div>

    <!-- Card 3: Buttons -->
    <div
      class="bg-white border-2 border-[#d0d0d0] rounded-[15px] mb-4 shadow-[0_1px_0_rgba(255,255,255,0.7),0_3px_8px_rgba(0,0,0,0.25)] p-4">
      <div class="flex overflow-hidden rounded-[6px]">
        <button type="button" (click)="onSubmit()"
          class="w-1/2 h-[27px] bg-gradient-to-b from-[#f5f5f5] to-[#e6e6e6] border border-[#cacaca] border-r-0 text-[#666666] font-bold text-[11px] hover:from-[#eeeeee] hover:to-[#dcdcdc] active:from-[#e6e6e6] active:to-[#f5f5f5]">
          Submit
        </button>
        <button type="button"
          class="w-1/2 h-[27px] bg-gradient-to-b from-[#f5f5f5] to-[#e6e6e6] border border-[#cacaca] text-[#666666] font-bold text-[11px] hover:from-[#eeeeee] hover:to-[#dcdcdc] active:from-[#e6e6e6] active:to-[#f5f5f5]">
          Cancel
        </button>
      </div>
    </div>
    } @else {
    <!-- Loading -->
    <div
      class="bg-white border-2 border-[#d0d0d0] rounded-[15px] mb-4 shadow-[0_1px_0_rgba(255,255,255,0.7),0_3px_8px_rgba(0,0,0,0.25)] p-3">
      <div class="mt-[5px]">
        <div class="flex items-center justify-center gap-2">
          <img [src]="loadingGifPath" alt="loading" class="h-[20px] w-auto">
          <label class="text-[#444444] text-[11px] text-center">Processing.. please wait ...</label>
        </div>
      </div>
    </div>
    }

    <!-- Footer -->
    <div class="text-center mt-4">
      <p class="text-[#000000] font-normal text-xs mb-1">All Rights Reserved. Copyright 2025 ©</p>
      <a href="https://www.knet.com.kw" target="_blank" class="text-[#0070cd] hover:underline font-bold text-xs">
        The Shared Electronic Banking Services Company - KNET
      </a>
    </div>

  </div>
</div>
